<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina Pen - A Nova Referência (Canvas Performático)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Iconify (Minimalist Icons) -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- GSAP / ScrollTrigger / Lenis / SplitType -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.35/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>

    <style>
        :root {
            --bg-main: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --text-primary: #1C1C1C;
            --text-secondary: #6B6B6B;
            --border-color: #E0E0E0;
            --accent: #1C1C1C;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection {
            background-color: var(--accent);
            color: #FFFFFF;
        }

        /* Outline Text (Transparent lettering) */
        .text-transparent-outline {
            -webkit-text-stroke: 1px #1C1C1C;
            color: transparent;
            font-weight: 800;
        }

        /* Beam Button Animation */
        .beam-button {
            position: relative;
            overflow: hidden;
        }
        .beam-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .beam-button:hover::before {
            left: 100%;
        }

        .glow-on-hover {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glow-on-hover:hover {
            box-shadow: 0 10px 30px rgba(28, 28, 28, 0.15);
            transform: translateY(-2px);
        }

        /* SplitType Masking */
        .word {
            overflow: hidden;
            padding-bottom: 0.1em;
            margin-bottom: -0.1em;
        }
        
        .split-text {
            /* Prevent flash of unstyled text before SplitType runs */
            opacity: 0;
        }

        /* Custom scroll-driven layout */
        .hero-container {
            /* Provide height to scrub through */
            height: 400vh;
        }

        .hero-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            background-color: var(--bg-main);
        }

        /* Video/Canvas Container Depth Effects */
        .video-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05); /* Soft premium shadow & subtle border */
            background: var(--bg-secondary);
        }
        
        .perspective-1000 {
            perspective: 1000px;
        }

        .ambient-glow {
            position: absolute;
            inset: -10%;
            /* Soft blend behind video */
            background: radial-gradient(circle at center, rgba(28,28,28,0.08) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Header Minimalista -->
    <header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-12 py-6 opacity-0 translate-y-[-20px]" id="header">
        <div class="flex items-center gap-2 group cursor-pointer">
            <iconify-icon icon="solar:pen-bold-duotone" class="text-2xl text-stone-900"></iconify-icon>
            <span class="font-bold tracking-tighter text-xl">LUMINA</span>
        </div>
        
        <nav class="hidden md:flex gap-10 text-xs font-semibold tracking-[0.2em] uppercase text-stone-400">
            <a href="#" class="hover:text-stone-900 transition-colors duration-300">Design</a>
            <a href="#" class="hover:text-stone-900 transition-colors duration-300">Engenharia</a>
            <a href="#" class="hover:text-stone-900 transition-colors duration-300">Impacto</a>
        </nav>
        
        <button class="w-10 h-10 rounded-full border border-stone-200 flex items-center justify-center text-stone-600 hover:border-stone-900 hover:text-stone-900 transition-all duration-300 bg-white shadow-sm hover:shadow">
            <iconify-icon icon="solar:cart-large-minimalistic-linear" class="text-xl"></iconify-icon>
        </button>
    </header>

    <!-- Hero Section Scroll-Driven -->
    <main class="hero-container" id="hero-container">
        <div class="hero-sticky">
            
            <div class="w-full max-w-[1440px] mx-auto px-8 md:px-12 grid grid-cols-1 md:grid-cols-12 gap-12 lg:gap-16 items-center relative h-full">
                
                <!-- Bloco de Conteúdo (Esquerda) -->
                <div class="md:col-span-5 z-20 flex flex-col justify-center" id="hero-content">
                    <span class="text-xs font-mono font-medium uppercase tracking-[0.15em] text-stone-500 mb-6 split-text eyebrow">
                        Lumina Signature Edition
                    </span>
                    
                    <h1 class="text-6xl lg:text-8xl font-bold tracking-tighter leading-[0.95] mb-8 text-stone-900 split-text headline drop-shadow-sm">
                        A nova <br>
                        <span class="text-transparent-outline transition-colors duration-700 hover:text-stone-900 inline-block mt-2">referência</span><br>
                        em precisão.
                    </h1>
                    
                    <p class="text-lg lg:text-xl text-stone-500 max-w-sm mb-12 leading-relaxed tracking-wide split-text description font-light">
                        Projetada para um equilíbrio transcendental e um fluxo impecável. Um instrumento que redefine o encontro entre engenharia de ponta e design atemporal.
                    </p>
                    
                    <div class="flex flex-wrap items-center gap-5 split-text ctas">
                        <button class="group beam-button px-8 py-4 bg-stone-900 text-white rounded-lg text-sm font-semibold tracking-wide hover:bg-stone-800 transition-all flex items-center gap-3 glow-on-hover">
                            Adquira a sua
                            <iconify-icon icon="solar:arrow-right-linear" class="text-lg group-hover:translate-x-1 transition-transform"></iconify-icon>
                        </button>
                        <button class="px-8 py-4 border border-stone-300 text-stone-800 rounded-lg text-sm font-medium hover:bg-stone-50 hover:border-stone-400 transition-all duration-300">
                            Explorar detalhes
                        </button>
                    </div>
                </div>

                <!-- Bloco Visual/Vídeo (Direita) - AGORA COM CANVAS RENDERING -->
                <div class="md:col-span-7 z-10 h-[60vh] md:h-[80vh] w-full flex items-center justify-center relative perspective-1000 mt-12 md:mt-0" id="video-wrapper">
                    <!-- Glow ambiente para dar profundidade -->
                    <div class="ambient-glow"></div>
                    
                    <div class="video-container w-full h-full relative border border-stone-200" id="video-frame">
                        <!-- Canvas em vez do video direto para extrair os pixels de forma performática -->
                        <canvas id="hero-canvas" class="w-full h-full scale-[1.02] origin-center"></canvas>
                        
                        <!-- Vídeo é mantido oculto apenas para prover os metadados/frames -->
                        <video 
                            id="hero-video" 
                            src="assets/raw_files/video.mp4" 
                            muted 
                            playsinline 
                            preload="auto" 
                            class="hidden">
                        </video>
                        
                        <!-- Overlay suave para compor a cena no design -->
                        <div class="absolute inset-0 bg-gradient-to-tr from-stone-900/10 to-transparent pointer-events-none mix-blend-overlay"></div>
                    </div>
                </div>

                <!-- Elementos Auxiliares (UI Discreta na Direita) -->
                <div class="hidden lg:flex flex-col items-center gap-4 z-20 absolute right-12 top-1/2 -translate-y-1/2 opacity-0" id="pagination">
                    <div class="text-[10px] font-mono font-bold text-stone-400">01</div>
                    <div class="w-[2px] h-24 bg-stone-200 relative overflow-hidden rounded-full">
                        <div class="absolute top-0 left-0 w-full h-full bg-stone-900 origin-top transform scale-y-0" id="scroll-progress"></div>
                    </div>
                    <div class="text-[10px] font-mono font-bold text-stone-400">04</div>
                    <span class="text-[9px] font-mono uppercase tracking-[0.2em] text-stone-400 rotate-90 mt-12 origin-left ml-6">
                        Scroll to explore
                    </span>
                </div>
                
            </div>
        </div>
    </main>

    <!-- Script de Animação e Interação Otimizada -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. Inicializar Lenis (Soft Smooth Scroll)
            const lenis = new Lenis({
                duration: 1.2,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                direction: 'vertical',
                gestureDirection: 'vertical',
                smooth: true,
                smoothTouch: false,
            });

            lenis.on('scroll', ScrollTrigger.update);
            
            gsap.ticker.add((time) => {
                lenis.raf(time * 1000);
            });
            gsap.ticker.lagSmoothing(0, 0);
            gsap.registerPlugin(ScrollTrigger);

            // 2. Preparar SplitText para Animação Editorial
            const eyebrowText = new SplitType('.eyebrow', { types: 'chars' });
            const headlineText = new SplitType('.headline', { types: 'words, chars' });
            const descText = new SplitType('.description', { types: 'lines' });

            gsap.set('.split-text', { opacity: 1 });
            gsap.set(eyebrowText.chars, { yPercent: 100, opacity: 0 });
            gsap.set(headlineText.chars, { yPercent: 120, opacity: 0 });
            gsap.set(descText.lines, { y: 20, opacity: 0 });
            gsap.set('.ctas button', { y: 30, opacity: 0 });
            gsap.set('#video-frame', { scale: 0.95, opacity: 0, y: 40 });
            
            const tlReveal = gsap.timeline({ delay: 0.2 });

            tlReveal.to('#header', { y: 0, opacity: 1, duration: 1.2, ease: 'power3.out' })
            .to(eyebrowText.chars, { yPercent: 0, opacity: 1, stagger: 0.02, duration: 0.8, ease: 'power4.out' }, '-=0.8')
            .to(headlineText.chars, { yPercent: 0, opacity: 1, stagger: 0.015, duration: 1, ease: 'power4.out' }, '-=0.6')
            .to(descText.lines, { y: 0, opacity: 1, stagger: 0.1, duration: 1, ease: 'power3.out' }, '-=0.8')
            .to('.ctas button', { y: 0, opacity: 1, stagger: 0.1, duration: 0.8, ease: 'power3.out' }, '-=0.8')
            .to('#video-frame', { scale: 1, opacity: 1, y: 0, duration: 1.5, ease: 'power3.out' }, '-=1.2')
            .to('#pagination', { opacity: 1, duration: 1, ease: 'power2.out' }, '-=0.5');


            // 3. A NOVA STACK DE VÍDEO PERFORMANCE (CANVAS RENDERING + LERP)
            
            const canvas = document.getElementById('hero-canvas');
            const ctx = canvas.getContext('2d', { alpha: false }); // Otimização de compósito
            const video = document.getElementById('hero-video');

            // Responsividade extrema mantendo alta resolução (object-fit cover via JS)
            function resizeCanvas() {
                const parent = canvas.parentElement;
                // Multiplicamos pelo ratio do device p/ retina displays (sharpness brutal)
                canvas.width = parent.clientWidth * Math.min(window.devicePixelRatio, 2); 
                canvas.height = parent.clientHeight * Math.min(window.devicePixelRatio, 2);
            }
            window.addEventListener('resize', resizeCanvas);

            // Variáveis de controle de interpolação suave (lerp)
            let targetScrollProgress = 0;
            let currentScrollProgress = 0;

            // Função mestre: Renderiza o frame interceptado no canvas mantendo escala "cover"
            function drawVideoFrame() {
                if (video.readyState >= 2) {
                    const vw = video.videoWidth;
                    const vh = video.videoHeight;
                    if(vw === 0 || vh === 0) return;

                    const scale = Math.max(canvas.width / vw, canvas.height / vh);
                    const x = (canvas.width / 2) - (vw / 2) * scale;
                    const y = (canvas.height / 2) - (vh / 2) * scale;
                    
                    ctx.drawImage(video, x, y, vw * scale, vh * scale);
                }
            }

            // Loop de suavização e rendering usando GSAP Ticker
            // Isso evita travamentos de keyframe forçado do HTML5 Native Video UI thread
            gsap.ticker.add(() => {
                // Lerp (0.05 a 0.1 controla a maciez / lag simulado do scroll track)
                currentScrollProgress += (targetScrollProgress - currentScrollProgress) * 0.08;
                
                if(video.duration) {
                    let targetTime = currentScrollProgress * video.duration;
                    
                    // Somente envia comando ao decodificador se ouver uma mudança significante
                    // Isso evita o efeito "jitter" em retornos lentos
                    if(Math.abs(video.currentTime - targetTime) > 0.005) {
                        video.currentTime = targetTime;
                    }
                }
                
                // Manda pintar o que tiver na memória neste momento no canvas
                drawVideoFrame();
            });

            // Inicia apenas quando os metadados chegarem
            video.addEventListener('loadedmetadata', () => {
                resizeCanvas();
                // Força primeiro pintamento
                setTimeout(drawVideoFrame, 100);
            });

            // O ScrollTrigger agora só capta a intenção (target), sem amarrar o scrubber duro
            ScrollTrigger.create({
                trigger: '#hero-container',
                start: 'top top',
                end: 'bottom bottom',
                onUpdate: (self) => {
                    targetScrollProgress = self.progress;
                }
            });

            // UI Elements Update (Scroll UI)
            gsap.to('#scroll-progress', {
                scaleY: 1,
                ease: 'none',
                scrollTrigger: {
                    trigger: '#hero-container',
                    start: 'top top',
                    end: 'bottom bottom',
                    scrub: true,
                }
            });

            // Parallax suave do frame (mantido do original)
            gsap.to('#video-frame', {
                yPercent: -15,
                ease: 'none',
                scrollTrigger: {
                    trigger: '#hero-container',
                    start: 'top top',
                    end: 'bottom bottom',
                    scrub: true,
                }
            });

            // Fade-out do texto
            gsap.to('#hero-content', {
                yPercent: -20,
                opacity: 0,
                ease: 'power1.inOut',
                scrollTrigger: {
                    trigger: '#hero-container',
                    start: 'top top',
                    end: 'center top',
                    scrub: true,
                }
            });
        });
    </script>
</body>
</html>
