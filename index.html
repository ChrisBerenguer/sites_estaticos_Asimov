<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artools Precision Pen</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Iconify (Minimalist Icons) -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- GSAP / ScrollTrigger / Lenis / SplitType -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.35/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>

    <style>
        :root {
            --bg-main: #FAFAFA;
            --text-primary: #000000;
            --text-secondary: #757575;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection {
            background-color: #000000;
            color: #FFFFFF;
        }

        /* Outline Text (Transparent lettering) conforme referência */
        .text-transparent-outline {
            -webkit-text-stroke: 1.5px #000000;
            color: transparent;
            font-weight: 800;
        }

        /* SplitType Masking */
        .word {
            overflow: relative;
            padding-bottom: 0.1em;
            margin-bottom: -0.1em;
            line-height: inherit;
        }

        .split-text {
            /* Prevent flash of unstyled text before SplitType runs */
            opacity: 0;
        }

        /* Custom scroll-driven layout */
        .hero-container {
            /* Fornece a altura necessária para o scroll suave (scrub) */
            height: 350vh;
        }

        .hero-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            background-color: var(--bg-main);
        }

        /* Video/Canvas Container sem borders pesadas para um ar Apple clean */
        .video-container {
            position: relative;
            background: transparent;
        }

        /* Custom line-height de ultra-precisão para matar os espaçamentos */
        .tight-leading {
            line-height: 0.88;
        }

        .text-balanced {
            text-wrap: balance;
        }
    </style>
</head>

<body>

    <!-- Header Minimalista -->
    <header
        class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-12 py-6 opacity-0 translate-y-[-20px]"
        id="header">
        <div class="flex items-center gap-2 group cursor-pointer">
            <span class="font-bold tracking-tighter text-xl text-black">ARTOOLS</span>
        </div>
    </header>

    <!-- Hero Section Scroll-Driven -->
    <main class="hero-container" id="hero-container">
        <div class="hero-sticky">

            <div
                class="w-full max-w-[1440px] mx-auto px-8 md:px-16 grid grid-cols-1 md:grid-cols-12 gap-8 items-center relative h-full">

                <!-- Bloco de Conteúdo (Esquerda) -->
                <div class="md:col-span-8 lg:col-span-9 z-20 flex flex-col justify-center pt-24 md:pt-0"
                    id="hero-content">

                    <!-- Eyebrow "Precision Series" com dot negro -->
                    <div class="flex items-center gap-3 mb-6 split-text eyebrow">
                        <div class="w-[6px] h-[6px] rounded-full bg-black"></div>
                        <span class="text-xs font-mono font-medium uppercase tracking-[0.1em] text-gray-500">
                            Precision Series
                        </span>
                    </div>

                    <!-- Headline Ultra-compacto da referência (reduzida em 25%) -->
                    <h1
                        class="text-[9vw] md:text-[3.75rem] lg:text-[4.8rem] xl:text-[5.25rem] font-bold tracking-tighter tight-leading mb-8 text-black split-text headline whitespace-nowrap">
                        A caneta<br>
                        <span class="text-transparent-outline">mais tecnológica</span><br>
                        do mundo.
                    </h1>

                    <!-- Descrição compactada e legível -->
                    <p
                        class="text-[1.05rem] md:text-[1.2rem] text-gray-500 max-w-lg mb-10 leading-[1.6] split-text description font-normal text-balanced">
                        A Artools Precision Pen redefine o equilíbrio entre peso, fluxo e design. Feita para criadores
                        que exigem perfeição em cada traço.
                    </p>

                    <!-- CTAs em estilo Pill da referência -->
                    <div class="flex flex-wrap items-center gap-4 split-text ctas">
                        <button
                            class="px-8 py-3.5 bg-black text-white rounded-full text-sm font-semibold hover:bg-stone-800 transition-all">
                            Comprar Agora
                        </button>
                        <button
                            class="flex items-center gap-2 px-8 py-3.5 bg-white text-black rounded-full text-sm font-semibold shadow-[0_4px_16px_rgba(0,0,0,0.06)] hover:shadow-[0_8px_24px_rgba(0,0,0,0.1)] transition-all">
                            Explorar <iconify-icon icon="solar:arrow-down-linear" class="text-lg"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Bloco Visual (Canvas no lugar de Video para máxima performance) -->
                <div class="md:col-span-6 lg:col-span-6 z-10 w-[120%] h-[120%] flex items-center justify-center absolute right-[-20%] md:right-[-10%] top-[-10vh] md:top-1/2 md:translate-y-[-50%] pointer-events-none"
                    id="video-wrapper">
                    <div class="video-container w-full h-full relative" id="video-frame">
                        <canvas id="hero-canvas" class="w-full h-full object-contain origin-center"></canvas>

                        <!-- Vídeo Invisível Engine -->
                        <video id="hero-video" src="assets/raw_files/video.mp4" muted playsinline preload="auto"
                            class="hidden">
                        </video>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Script de Animação e Interação Otimizada -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            // 1. Inicializar Lenis (Soft Smooth Scroll)
            const lenis = new Lenis({
                duration: 1.2,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                direction: 'vertical',
                gestureDirection: 'vertical',
                smooth: true,
                smoothTouch: false,
            });

            lenis.on('scroll', ScrollTrigger.update);

            gsap.ticker.add((time) => {
                lenis.raf(time * 1000);
            });
            gsap.ticker.lagSmoothing(0, 0);
            gsap.registerPlugin(ScrollTrigger);

            // 2. Preparar SplitText para Animação Editorial 
            // Tratamento especial para as quebras da headline
            const eyebrowText = new SplitType('.eyebrow', { types: 'chars' });
            const headlineText = new SplitType('.headline', { types: 'words, chars' });
            const descText = new SplitType('.description', { types: 'lines' });

            gsap.set('.split-text', { opacity: 1 });
            gsap.set(eyebrowText.chars, { yPercent: 100, opacity: 0, filter: 'blur(8px)' });
            gsap.set(headlineText.chars, { yPercent: 120, opacity: 0, filter: 'blur(8px)' });
            gsap.set(descText.lines, { y: 30, opacity: 0, filter: 'blur(8px)' });
            gsap.set('.ctas button', { y: 30, opacity: 0, filter: 'blur(8px)' });
            gsap.set('#video-frame', { scale: 0.95, opacity: 0, x: 100 });

            const tlReveal = gsap.timeline({ delay: 0.2 });

            tlReveal.to('#header', { y: 0, opacity: 1, duration: 1.2, ease: 'power3.out' })
                .to(eyebrowText.chars, { yPercent: 0, opacity: 1, filter: 'blur(0px)', stagger: 0.02, duration: 0.9, ease: 'power4.out' }, '-=0.8')
                .to(headlineText.chars, { yPercent: 0, opacity: 1, filter: 'blur(0px)', stagger: 0.015, duration: 1.1, ease: 'power4.out' }, '-=0.6')
                .to(descText.lines, { y: 0, opacity: 1, filter: 'blur(0px)', stagger: 0.1, duration: 1, ease: 'power3.out' }, '-=0.8')
                .to('.ctas button', { y: 0, opacity: 1, filter: 'blur(0px)', stagger: 0.1, duration: 0.8, ease: 'power3.out' }, '-=0.8')
                .to('#video-frame', { scale: 1, opacity: 1, x: 0, duration: 2, ease: 'power3.out' }, '-=1.4');


            // 3. CANVAS VIDEO RENDERER (LERP SYSTEM)

            const canvas = document.getElementById('hero-canvas');
            const ctx = canvas.getContext('2d', { alpha: false });
            const video = document.getElementById('hero-video');

            // Responsive high-dpi
            function resizeCanvas() {
                const parent = canvas.parentElement;
                canvas.width = parent.clientWidth * Math.min(window.devicePixelRatio, 2);
                canvas.height = parent.clientHeight * Math.min(window.devicePixelRatio, 2);
            }
            window.addEventListener('resize', resizeCanvas);

            let targetScrollProgress = 0;
            let currentScrollProgress = 0;

            function drawVideoFrame() {
                if (video.readyState >= 2) {
                    const vw = video.videoWidth;
                    const vh = video.videoHeight;
                    if (vw === 0 || vh === 0) return;

                    // Ajuste para Object-fit: Contain no Canvas (já que a caneta tem background)
                    const scale = Math.min(canvas.width / vw, canvas.height / vh);
                    const x = (canvas.width / 2) - (vw / 2) * scale;
                    const y = (canvas.height / 2) - (vh / 2) * scale;

                    ctx.fillStyle = "#FAFAFA";
                    ctx.fillRect(0, 0, canvas.width, canvas.height); // limpar frame com a cor do bg
                    ctx.drawImage(video, x, y, vw * scale, vh * scale);
                }
            }

            gsap.ticker.add(() => {
                // Lerp core para supressão do jitter
                currentScrollProgress += (targetScrollProgress - currentScrollProgress) * 0.08;

                if (video.duration) {
                    let targetTime = currentScrollProgress * video.duration;
                    if (Math.abs(video.currentTime - targetTime) > 0.005) {
                        video.currentTime = targetTime;
                    }
                }
                drawVideoFrame();
            });

            video.addEventListener('loadedmetadata', () => {
                resizeCanvas();
                setTimeout(drawVideoFrame, 100);
            });

            ScrollTrigger.create({
                trigger: '#hero-container',
                start: 'top top',
                end: 'bottom bottom',
                onUpdate: (self) => {
                    targetScrollProgress = self.progress;
                }
            });

            // Efeito Parallax Suave - O Video (Canvas) sobe levemente no scroll
            gsap.to('#video-wrapper', {
                yPercent: -20,
                ease: 'none',
                scrollTrigger: {
                    trigger: '#hero-container',
                    start: 'top top',
                    end: 'bottom bottom',
                    scrub: true,
                }
            });

            // O Texto vai sumindo lentamente e com BLUR-OUT respeitando o design system
            const tlExit = gsap.timeline({
                scrollTrigger: {
                    trigger: '#hero-container',
                    start: 'top top',
                    end: 'center top',
                    scrub: true,
                }
            });

            tlExit.to(eyebrowText.chars, { yPercent: -100, opacity: 0, filter: 'blur(8px)', stagger: 0.01, ease: 'power1.inOut' }, 0)
                .to(headlineText.chars, { yPercent: -120, opacity: 0, filter: 'blur(8px)', stagger: 0.015, ease: 'power1.inOut' }, 0.05)
                .to(descText.lines, { y: -30, opacity: 0, filter: 'blur(8px)', stagger: 0.05, ease: 'power1.inOut' }, 0.1)
                .to('.ctas button', { y: -30, opacity: 0, filter: 'blur(8px)', stagger: 0.05, ease: 'power1.inOut' }, 0.15);
        });
    </script>
</body>

</html>
